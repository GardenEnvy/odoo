###############################################################
# Odoo 18.0 — Coolify v4 deployment
# Deploy via: Coolify > New Resource > Docker Compose (Raw)
# Volumes: Coolify will persist data across deployments
###############################################################

services:

  # ─── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD:: Grass15Greener!
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo-internal

  # ─── Odoo 18.0 ───────────────────────────────────────────
  odoo:
    image: 'odoo:18.0'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: odoo
      DB_PASSWORD: Grass15Greener!
    volumes:
      # Persistent Odoo data (sessions, filestore, etc.)
      - odoo-web-data:/var/lib/odoo
      # Odoo config file
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      # ✅ Custom addons folder — drop your modules here
      - ./addons:/mnt/extra-addons
    # Coolify's Traefik proxy will handle HTTPS termination.
    # Remove/adjust these labels if you're using a custom domain
    # configured directly inside Coolify's UI instead.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.odoo.rule=Host(`${ODOO_DOMAIN:-odoo.example.com}`)"
      - "traefik.http.routers.odoo.entrypoints=https"
      - "traefik.http.routers.odoo.tls=true"
      - "traefik.http.routers.odoo.tls.certresolver=letsencrypt"
      - "traefik.http.services.odoo.loadbalancer.server.port=8069"
      # Longpolling (live chat / bus)
      - "traefik.http.routers.odoo-longpoll.rule=Host(`${ODOO_DOMAIN:-odoo.example.com}`) && PathPrefix(`/longpolling`)"
      - "traefik.http.routers.odoo-longpoll.entrypoints=https"
      - "traefik.http.routers.odoo-longpoll.tls=true"
      - "traefik.http.routers.odoo-longpoll.tls.certresolver=letsencrypt"
      - "traefik.http.services.odoo-longpoll.loadbalancer.server.port=8072"
    networks:
      - odoo-internal
      - coolify          # Coolify's shared proxy network

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  odoo-db-data:
  odoo-web-data:

# ─── Networks ────────────────────────────────────────────────
networks:
  odoo-internal:
    driver: bridge
  coolify:
    external: true       # Pre-exists on every Coolify host
